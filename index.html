<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Einkaufsliste</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <div class="app">
        <header class="app-header">
            <span class="header-icon">🛒</span>
            <h1>Einkaufsliste</h1>
        </header>

        <div class="input-area">
            <input type="text" id="productInput" placeholder="Produkt eingeben …" autocomplete="off" maxlength="60" />
            <button id="addBtn" aria-label="Produkt hinzufügen">
                <span>+</span>
            </button>
        </div>

        <p class="empty-hint" id="emptyHint">Noch keine Produkte auf der Liste.</p>

        <ul class="product-list" id="productList"></ul>

        <div class="footer" id="listFooter" hidden>
            <span id="itemCount"></span>
            <button id="clearAllBtn">Alle löschen</button>
        </div>
    </div>
    <script src="https://kpqyeymjcoggdnosihey.supabase.co/rest/v1/"></script>
    <script src="script.js"></script>
</body>

</html>
