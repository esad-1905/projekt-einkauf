<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Einkaufsliste</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>

    <!-- ───────────── EINSTIEGS-AUSWAHL ───────────── -->
    <div class="app choice-screen" id="choiceScreen">
        <header class="app-header">
            <span class="header-icon">🛒</span>
            <h1>Einkaufsliste</h1>
        </header>

        <div class="choice-buttons">
            <button class="choice-btn" id="goToJoin">
                <span class="choice-icon">🔑</span>
                <span class="choice-label">Liste beitreten</span>
                <span class="choice-desc">Mit Name, Listenname &amp; Passwort</span>
            </button>
            <button class="choice-btn" id="goToCreate">
                <span class="choice-icon">✨</span>
                <span class="choice-label">Liste erstellen</span>
                <span class="choice-desc">Neue Liste mit eigenem Passwort</span>
            </button>
        </div>
    </div>

    <!-- ───────────── BEITRETEN SCREEN ───────────── -->
    <div class="app auth-screen" id="joinScreen" hidden>
        <header class="app-header">
            <button class="back-btn" id="backFromJoin" aria-label="Zurück">←</button>
            <span class="header-icon">🔑</span>
            <h1>Liste beitreten</h1>
        </header>

        <form class="auth-form" id="joinForm">
            <label>Dein Name</label>
            <input type="text" id="joinName" placeholder="z.B. Max" maxlength="30" required />

            <label>Listenname</label>
            <input type="text" id="joinListName" placeholder="z.B. Familie Meyer" maxlength="50" required />

            <label>Passwort</label>
            <input type="password" id="joinPassword" placeholder="Passwort" required />

            <button type="submit" class="auth-submit">Beitreten</button>
            <p class="auth-error" id="joinError" hidden></p>
        </form>
    </div>

    <!-- ───────────── ERSTELLEN SCREEN ───────────── -->
    <div class="app auth-screen" id="createScreen" hidden>
        <header class="app-header">
            <button class="back-btn" id="backFromCreate" aria-label="Zurück">←</button>
            <span class="header-icon">✨</span>
            <h1>Liste erstellen</h1>
        </header>

        <form class="auth-form" id="createForm">
            <label>Dein Name</label>
            <input type="text" id="createName" placeholder="z.B. Max" maxlength="30" required />

            <label>Listenname</label>
            <input type="text" id="createListName" placeholder="z.B. Familie Meyer" maxlength="50" required />

            <label>Neues Passwort</label>
            <input type="password" id="createPassword" placeholder="Passwort vergeben" required />

            <button type="submit" class="auth-submit">Liste erstellen</button>
            <p class="auth-error" id="createError" hidden></p>
        </form>
    </div>

    <!-- ───────────── EINKAUFSLISTE SCREEN ───────────── -->
    <div class="app list-screen" id="listScreen" hidden>
        <header class="app-header">
            <span class="header-icon">🛒</span>
            <h1 id="currentListName">Einkaufsliste</h1>
            <button id="newListBtn" class="new-btn" aria-label="Neue Liste">New</button>
        </header>

        <div class="sub-header">
            <span id="currentUserName"></span>
            <button id="shareBtn" class="share-btn">🔗 Teilen</button>
        </div>

        <div class="input-area">
            <input type="text" id="productInput" placeholder="Produkt eingeben …" autocomplete="off" maxlength="60" />
            <button id="addBtn" aria-label="Produkt hinzufügen">
                <span>+</span>
            </button>
        </div>

        <p class="empty-hint" id="emptyHint">Noch keine Produkte auf der Liste.</p>

        <ul class="product-list" id="productList"></ul>

        <div class="footer" id="listFooter" hidden>
            <span id="itemCount"></span>
            <button id="clearAllBtn">Alle löschen</button>
        </div>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>

</html>
